# 🔧 Nginx Configuration for bun-line.midseelee.com
# คำสั่งนี้จะ fix LINE OAuth โดย forwarding X-Forwarded-* headers

server {
    listen 80;
    listen [::]:80;
    server_name bun-line.midseelee.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bun-line.midseelee.com;

    # SSL Certificate (Let's Encrypt or your cert)
    ssl_certificate /etc/ssl/certs/bun-line.midseelee.com.crt;
    ssl_certificate_key /etc/ssl/private/bun-line.midseelee.com.key;

    # 🌐 Reverse Proxy to Docker Container (Port 12914)
    location / {
        proxy_pass http://localhost:12914;
        proxy_http_version 1.1;

        # 🔒 CRITICAL: These headers fix LINE OAuth!
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support (for SSE)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Server $host;

        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# 📋 Installation Instructions:
# 1. Copy this file to: /etc/nginx/sites-available/bun-line.midseelee.com
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/bun-line.midseelee.com /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload nginx: sudo systemctl reload nginx
